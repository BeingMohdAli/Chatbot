<!DOCTYPE html>
<html>
  <head>
    <title> Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
     function ChatInput(){
      return( 
        <>
          <input 
            placeholder = "Send a message to ChatBot" 
            size="30"
          />
          <button>send</button>
        </>
      )
     }
     function Chatmessage({message,sender}){
//      const sender = props.sender;
//      const message = props.message;

//shortcuts in react
      // const{message}=props
      // const{sender}=props
      // const{message,sender}=props
      //directly write {messgae,sender} in perimeter this is another shortcut
      // if(sender==="robot"){
      //   return(
      //      <div>
      //      <img src="images.png"width="35" height="35"/>
      //      {message}
      //      </div>
      //        )
     
    return (
       <div>
          {sender==="robot"&&(
            <img src="images.png"width="35" height="35"/>
          )}
          {message}
          {sender==="User"&&(
            <img src="download.png" width="30" height="25"/>
          )}
        </div>
  )
      }
     function App(){
      const chatmessage = [{
        message:"Hello ChatBot",
        sender:"User"
      }, {message:"Hello! How can I help you?",
          sender:"robot"
      }, {message:"Can you get me todays date?",
          sender:"User"
      },{ message:"Todays is September 27?",
          sender:"robot"
      }]
      const chatmessgaecomponents = chatmessage.map((chatmessage)=>{
        return(
          <Chatmessage
          message={chatmessage.message}
          sender={chatmessage.sender}
          />
        )
      })
      return(
      <>
        <ChatInput/>
        {chatmessgaecomponents}
      
      </>  
      )
     }
 

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
